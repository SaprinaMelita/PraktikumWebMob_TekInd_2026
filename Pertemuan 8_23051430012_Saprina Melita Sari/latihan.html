<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Integrasi API Data Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
    <link rel="stylesheet" href="latihan.css">

<body class="container mt-5">
    <h2>Data Karyawan (Dari Server)</h2>

    <div class="mb-3 d-flex align-items-center gap-2">
        <button id="btnLoad" class="btn btn-primary">Muat Data dari API</button>
        <button id="btnFilter" class="btn btn-secondary">Filter data</button>
        <button id="btnTambah" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalTambah">Tambah
            Karyawan Baru</button>
        <div id="loading" class="spinner-border text-primary d-none" role="status"></div>
    </div>

    <div class="row" id="containerKaryawan">
    </div>

    <div class="modal fade" id="modalDetail" tabindex="-1" aria-labelledby="modalDetailLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalDetailLabel">Detail Profil Karyawan</h5>
                </div>
                <div class="modal-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item"><strong>Nama:</strong> <span id="detailNama"></span></li>
                        <li class="list-group-item"><strong>Username:</strong> <span id="detailUsername"></span></li>
                        <li class="list-group-item"><strong>Email:</strong> <span id="detailEmail"></span></li>
                        <li class="list-group-item"><strong>Telepon:</strong> <span id="detailTelepon"></span></li>
                        <li class="list-group-item"><strong>Website:</strong> <span id="detailWebsite"></span></li>
                        <li class="list-group-item"><strong>Perusahaan:</strong> <span id="detailPerusahaan"></span>
                        </li>
                        <li class="list-group-item"><strong>Alamat Lengkap:</strong> <span id="detailAlamat"></span>
                        </li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTambah" tabindex="-1" aria-labelledby="modalTambahLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formTambahKaryawan">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTambahLabel">Input Karyawan Baru</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="inputNama" class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" id="inputNama" placeholder="Misal: Rajeshwari"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="rajeshwari@email.com"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="inputPerusahaan" class="form-label">Nama Perusahaan</label>
                            <input type="text" class="form-control" id="inputPerusahaan" placeholder="PT Suzuki"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="inputKota" class="form-label">Kota</label>
                            <input type="text" class="form-control" id="inputKota" placeholder="Kota Baru" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="latihan.js"></script>
</body>

</html>
