<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit 5S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2>Checklist Audit 5S</h2>
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Form Audit</div>
                <div class="card-body">
                    <form id="formAudit">
                        <div class="mb-3">
                            <label>Nama Auditor</label>
                            <input type="text" id="auditor" class="form-control" placeholder="Masukkan Nama" required>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="seiri">
                                <label class="form-check-label" for="seiri">Seiri (Sort)</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="seiton">
                                <label class="form-check-label" for="seiton">Seiton (Set in Order)</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="seiso">
                                <label class="form-check-label" for="seiso">Seiso (Shine)</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="seiketsu">
                                <label class="form-check-label" for="seiketsu">Seiketsu (Standardize)</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="shitsuke">
                                <label class="form-check-label" for="shitsuke">Shitsuke (Sustain)</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Simpan Audit</button>
                        <button type="button" id="btnHapusSemua" class="btn btn-danger w-100 mt-2">Hapus Semua Data</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h3>Riwayat Audit</h3>
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Tanggal</th>
                        <th>Auditor</th>
                        <th>Skor (%)</th>
                    </tr>
                </thead>
                <tbody id="tabelAudit">
                    <!-- Data akan muncul di sini -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="aplikasi checklist.js"></script>
</body>
</html>
