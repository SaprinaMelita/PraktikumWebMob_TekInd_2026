<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perhitungan Lingkaran</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS tambahan -->
    <link rel="stylesheet" href="latihan1.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="">TekInd Systems</a>
    </div>
</nav>
<div class="container mt-4">
<!-- PROYEK MINI - Kalkulator Tagihan Listrik -->
<div class="card mt-4">
    <div class="card-header bg-primary text-white">
        Kalkulator Tagihan Listrik
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <label>Daya (Watt)</label>
                <input type="number" id="inputDaya" class="form-control mb-2" placeholder="Masukkan daya (Watt)">
            </div>
            <div class="col-md-6">
                <label>Jam Pemakaian</label>
                <input type="number" id="inputJam" class="form-control mb-2" placeholder="Masukkan jam pemakaian">
            </div>
        </div>
        <div id="hasilListrik" class="alert alert-info mt-3 d-none">
            <p class="mb-1">Total kWh: <strong id="totalKwh"></strong></p>
            <p class="mb-0">Estimasi Biaya: <strong id="totalBiaya"></strong></p>
        </div>
    </div>
</div>
</div>

<script src="Kalkulator Tagihan Listrik.js"></script>

</body>
</html>
